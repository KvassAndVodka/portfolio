name: Deploy to Production

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Production Deployment Target
        run: |
          if ! grep -qx 'DEPLOY_TARGET=production' deployment.env; then
            echo "::error::deployment.env must contain DEPLOY_TARGET=production"
            exit 1
          fi
          echo "Production deployment target verified."

      - name: Create .env from Secret
        run: |
          # The quotes around 'EOF' are mandatory to stop $ expansion
          cat << 'EOF' > .env
          ${{ secrets.PORTFOLIO_ENV }}
          EOF

      - name: Clean Docker Build Cache
        run: |
          echo "Pruning Docker build cache (keeping up to 1GB)..."
          docker builder prune -f --keep-storage=1gb
          echo "Pruning unused Docker images..."
          docker image prune -af

      - name: Tag Current Image as Rollback
        run: |
          if docker image inspect portfolio:latest >/dev/null 2>&1; then
            docker tag portfolio:latest portfolio:rollback
            echo "Tagged current image as portfolio:rollback"
          else
            echo "No existing portfolio image found, skipping rollback tag"
          fi

      - name: Build New Image
        id: build
        run: |
          echo "Building new image while existing containers keep running..."
          docker compose build

      - name: Deploy New Containers
        run: |
          # Keep long-lived infrastructure in place. Recreating Tailscale and the
          # web service together can make web join a network namespace whose
          # owning container is still restarting.
          docker compose up -d postgres tailscale

          echo "Waiting for the Tailscale network namespace to become stable..."
          STABLE_CHECKS=0
          for i in $(seq 1 30); do
            if [ "$(docker inspect -f '{{.State.Running}}' tailscale 2>/dev/null)" = "true" ] && \
               docker exec tailscale test -S /var/run/tailscale/tailscaled.sock 2>/dev/null; then
              STABLE_CHECKS=$((STABLE_CHECKS+1))
              if [ "$STABLE_CHECKS" -ge 3 ]; then
                break
              fi
            else
              STABLE_CHECKS=0
            fi
            sleep 2
          done

          if [ "$STABLE_CHECKS" -lt 3 ]; then
            echo "::error::Tailscale did not reach a stable running state"
            docker compose logs --tail=100 tailscale
            exit 1
          fi

          docker compose up -d --no-deps --force-recreate web
          docker image prune -f

      - name: Health Check
        id: healthcheck
        run: |
          echo "Waiting for app to initialize..."
          RETRIES=15
          DELAY=5
          SUCCESS=false

          # Install curl in the tailscale container for health checks
          docker exec tailscale apk add --no-cache curl > /dev/null 2>&1 || true

          for i in $(seq 1 $RETRIES); do
            echo "Health check attempt $i/$RETRIES..."
            # Curl from inside the tailscale container since web shares its network
            if docker exec tailscale curl -sf --max-time 5 http://localhost:3000 > /dev/null 2>&1; then
              echo "App is healthy!"
              SUCCESS=true
              break
            fi
            echo "Not ready yet, retrying in ${DELAY}s..."
            sleep $DELAY
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "::error::Health check failed after $RETRIES attempts"
            exit 1
          fi

      - name: Rollback on Failure
        if: failure() && steps.build.outcome == 'success'
        run: |
          echo "::warning::Deployment failed — rolling back to previous image..."
          if docker image inspect portfolio:rollback >/dev/null 2>&1; then
            docker tag portfolio:rollback portfolio:latest
            docker compose up -d postgres tailscale

            STABLE_CHECKS=0
            for i in $(seq 1 30); do
              if [ "$(docker inspect -f '{{.State.Running}}' tailscale 2>/dev/null)" = "true" ] && \
                 docker exec tailscale test -S /var/run/tailscale/tailscaled.sock 2>/dev/null; then
                STABLE_CHECKS=$((STABLE_CHECKS+1))
                if [ "$STABLE_CHECKS" -ge 3 ]; then
                  break
                fi
              else
                STABLE_CHECKS=0
              fi
              sleep 2
            done

            if [ "$STABLE_CHECKS" -lt 3 ]; then
              echo "::error::Tailscale did not stabilize during rollback"
              docker compose logs --tail=100 tailscale
              exit 1
            fi

            docker compose up -d --no-deps --force-recreate web
            echo "Rollback complete. Previous version restored."

            # Re-establish Tailscale Funnel after rollback
            TIMEOUT=30
            until docker exec tailscale test -S /var/run/tailscale/tailscaled.sock || [ $TIMEOUT -eq 0 ]; do
              echo "Waiting for tailscale daemon socket... ($TIMEOUT s left)"
              sleep 2
              TIMEOUT=$((TIMEOUT-2))
            done
            sleep 15
            docker exec tailscale tailscale funnel --bg --https=443 http://localhost:3000
            echo "Tailscale Funnel re-established after rollback."
          else
            echo "::error::No rollback image found! Cannot restore previous version."
            exit 1
          fi

      - name: Ensure Tailscale Funnel is Up
        if: success()
        run: |
          TIMEOUT=30
          until docker exec tailscale test -S /var/run/tailscale/tailscaled.sock || [ $TIMEOUT -eq 0 ]; do
            echo "Waiting for tailscale daemon socket... ($TIMEOUT s left)"
            sleep 2
            TIMEOUT=$((TIMEOUT-2))
          done

          echo "Waiting 15s for app initialization..."
          sleep 15

          docker exec tailscale tailscale funnel --bg --https=443 http://localhost:3000
